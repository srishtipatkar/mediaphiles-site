kind = "web"
previewPath = "/"
title = "MediaPhiles"
version = "1.0.0"
id = "artifacts/mediaphiles"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22977

[services.development]
run = "pnpm --filter @workspace/mediaphiles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mediaphiles", "run", "build" ]
publicDir = "artifacts/mediaphiles/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22977"
BASE_PATH = "/"
